name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set build vars in wrangler.toml
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          COMMIT_HASH="${GITHUB_SHA::7}"
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" wrangler.toml
          sed -i "s/^BUILD_TIME = .*/BUILD_TIME = \"${BUILD_TIME}\"/" wrangler.toml
          sed -i "s/^COMMIT_HASH = .*/COMMIT_HASH = \"${COMMIT_HASH}\"/" wrangler.toml
          echo "Deploying: VERSION=${VERSION} BUILD_TIME=${BUILD_TIME} COMMIT_HASH=${COMMIT_HASH}"
          cat wrangler.toml

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
